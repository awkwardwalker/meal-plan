services:
  frontend:
    image: awkwardwalker/meal-plan-frontend:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - meal-plan
      - proxy

  backend:
    image: awkwardwalker/meal-plan-backend:latest
    restart: unless-stopped
    environment:
      DB_HOST: mysql         # name of your existing MySQL container
      DB_PORT: 3306
      DB_NAME: mealplan
      DB_USER: mealplan
      DB_PASSWORD: mealplan
    networks:
      - meal-plan
      - proxy                # must be on same network as your MySQL container

networks:
  meal-plan:
    driver: bridge
  proxy:
    external: true           # your existing Unraid Docker network where MySQL lives
