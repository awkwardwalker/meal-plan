name: Build & Push to Deploy Branch

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Push dist to deploy branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Switch to deploy branch (create orphan so it has no history)
          git checkout --orphan deploy-temp
          git rm -rf . --quiet

          # Copy dist contents to root
          cp -r dist/. .
          rm -rf dist

          # Commit and force push to deploy branch
          git add -A
          git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M:%S UTC') from ${GITHUB_SHA::7}"
          git push origin HEAD:deploy --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
